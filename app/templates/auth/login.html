<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Concluir PAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8 space-y-8 bg-white rounded-2xl shadow-xl border border-slate-100 transform transition-all">
        <div class="text-center">
            <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Bem-vindo(a)</h2>
            <p class="mt-2 text-sm text-slate-500">Faça login para continuar</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="space-y-2">
                {% for category, message in messages %}
                    <div class="p-4 text-sm rounded-lg {{ 'text-rose-800 bg-rose-50 border border-rose-100' if category == 'error' else 'text-emerald-800 bg-emerald-50 border border-emerald-100' }}" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form class="space-y-6" action="{{ url_for('auth.login') }}" method="POST">
            <div>
                <label for="loginUsuarioSistema" class="block text-sm font-medium text-slate-700">Usuário</label>
                <input type="text" id="loginUsuarioSistema" name="loginUsuarioSistema" required 
                       class="block w-full px-4 py-3 mt-2 text-slate-900 placeholder-slate-400 bg-slate-50 border border-slate-200 rounded-xl transition-colors duration-200 ease-in-out focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent sm:text-sm"
                       placeholder="Digite seu usuário">
            </div>

            <div>
                <label for="senhaUsuarioSistema" class="block text-sm font-medium text-slate-700">Senha</label>
                <input type="password" id="senhaUsuarioSistema" name="senhaUsuarioSistema" required 
                       class="block w-full px-4 py-3 mt-2 text-slate-900 placeholder-slate-400 bg-slate-50 border border-slate-200 rounded-xl transition-colors duration-200 ease-in-out focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent sm:text-sm"
                       placeholder="••••••••">
            </div>

            <button type="submit" 
                    class="group relative flex justify-center w-full px-4 py-3 text-sm font-semibold text-white transition-all duration-200 bg-blue-600 border border-transparent rounded-xl shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-600 active:scale-[0.98]">
                Entrar
            </button>
        </form>
    </div>
</body>
</html>
